services:
  # ── Backend: FastAPI (Python Web Service) ──────────────────────────────────
  - type: web
    name: archon-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-pro
      - key: MAX_UPLOAD_SIZE_MB
        value: "20"
      - key: ALLOWED_EXTENSIONS
        value: pdf,docx
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_NAME
        value: Archon
      # Set this after frontend is deployed
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Frontend: React + Vite (Static Site) ──────────────────────────────────
  - type: web
    name: archon-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: ./dist
    plan: free
    envVars:
      # After backend deploys, set this to: https://archon-backend.onrender.com
      - key: VITE_API_URL
        sync: false
